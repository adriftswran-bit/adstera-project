<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>MatchMe · welcome bonus</title>
  <!-- Font Awesome 6 (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #0b0e1a 0%, #1a1f33 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      max-width: 480px;
      width: 100%;
      background: rgba(22, 28, 50, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 56px;
      padding: 40px 28px 48px;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.05);
      transition: transform 0.2s ease;
      text-align: center;
      border: 1px solid rgba(255, 215, 100, 0.2);
    }

    .badge {
      display: inline-block;
      background: rgba(255, 215, 0, 0.15);
      padding: 8px 22px;
      border-radius: 60px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 1px;
      color: #f5d742;
      border: 1px solid rgba(255, 215, 0, 0.25);
      backdrop-filter: blur(4px);
      margin-bottom: 24px;
      text-transform: uppercase;
    }

    .logo {
      font-size: 3.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f9e05d, #f5b842);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -1px;
      line-height: 1.1;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .logo i {
      font-size: 2.6rem;
      color: #f5c542;
      background: rgba(255, 215, 0, 0.1);
      padding: 10px;
      border-radius: 30px;
    }

    .subhead {
      font-size: 1.1rem;
      color: #b7c4e6;
      font-weight: 400;
      letter-spacing: 0.3px;
      margin-top: -4px;
      margin-bottom: 28px;
      opacity: 0.9;
    }

    .bonus-box {
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.08), rgba(255, 190, 40, 0.02));
      border-radius: 40px;
      padding: 28px 16px 24px;
      margin: 16px 0 30px;
      border: 1px dashed rgba(255, 215, 0, 0.35);
      backdrop-filter: blur(4px);
      box-shadow: inset 0 4px 20px rgba(0,0,0,0.3);
    }

    .bonus-title {
      font-size: 1rem;
      font-weight: 500;
      color: #d3defa;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .bonus-amount {
      font-size: 3.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fde68a, #f5b342);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1.2;
      letter-spacing: 1px;
    }

    .bonus-amount small {
      font-size: 1.8rem;
      font-weight: 500;
      background: none;
      -webkit-background-clip: unset;
      background-clip: unset;
      color: #f5c542;
    }

    .bonus-desc {
      color: #a6b6e0;
      font-size: 0.95rem;
      margin-top: 6px;
      font-weight: 400;
      letter-spacing: 0.2px;
    }

    .telegram-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: #2a8cff;
      background: linear-gradient(135deg, #2a8cff, #1a6edb);
      padding: 18px 28px;
      border-radius: 80px;
      border: none;
      box-shadow: 0 12px 30px rgba(26, 110, 219, 0.4);
      transition: all 0.2s ease;
      cursor: pointer;
      width: 100%;
      margin: 14px 0 22px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.2rem;
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .telegram-btn i {
      font-size: 2rem;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }

    .telegram-btn span {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      line-height: 1.2;
    }

    .telegram-btn .btn-main {
      font-size: 1.2rem;
      letter-spacing: 0.3px;
    }

    .telegram-btn .btn-sub {
      font-size: 0.7rem;
      font-weight: 400;
      opacity: 0.8;
      letter-spacing: 0.5px;
    }

    .telegram-btn:hover {
      transform: scale(1.02);
      background: #3b96ff;
      box-shadow: 0 16px 40px rgba(26, 110, 219, 0.6);
    }

    .telegram-btn:active {
      transform: scale(0.98);
    }

    .footnote {
      color: #6c7da3;
      font-size: 0.8rem;
      margin-top: 26px;
      letter-spacing: 0.3px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      padding-top: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .footnote i {
      color: #f5c542;
      opacity: 0.7;
    }

    .footnote a {
      color: #a0b3e0;
      text-decoration: none;
      border-bottom: 1px dotted rgba(255, 215, 0, 0.2);
    }

    .footnote a:hover {
      color: #f5d742;
    }

    .pulse-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.4; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.2); }
      100% { opacity: 0.4; transform: scale(0.9); }
    }

    /* attractive extra shine */
    .glow-ring {
      position: relative;
    }

    .glow-ring::after {
      content: '';
      position: absolute;
      top: -4px;
      left: -4px;
      right: -4px;
      bottom: -4px;
      border-radius: 60px;
      background: radial-gradient(circle at 30% 20%, rgba(255,215,0,0.08), transparent 70%);
      z-index: -1;
      filter: blur(8px);
    }

    @media (max-width: 480px) {
      .card { padding: 28px 18px 36px; }
      .logo { font-size: 2.8rem; }
      .bonus-amount { font-size: 3.2rem; }
      .telegram-btn { padding: 16px 20px; font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="card glow-ring">
    <!-- decorative badge -->
    <div class="badge">
      <i class="fas fa-star" style="margin-right: 6px; font-size: 0.7rem;"></i> 
      limited offer
    </div>

    <!-- Logo / brand -->
    <div class="logo">
      <i class="fab fa-telegram-plane"></i> MatchMe
    </div>
    <div class="subhead">
      <i class="fas fa-users" style="opacity: 0.5; margin-right: 6px;"></i> 
      connect · chat · meet
    </div>

    <!-- BONUS promo -->
    <div class="bonus-box">
      <div class="bonus-title">
        <i class="fas fa-gift" style="margin-right: 8px; color: #f5c542;"></i> welcome bonus
      </div>
      <div class="bonus-amount">
        $5 <small>USD</small>
      </div>
      <div class="bonus-desc">
        <i class="fas fa-check-circle" style="color: #4ade80; margin-right: 6px;"></i> 
        get when you sign up via Telegram
      </div>
    </div>

    <!-- MAIN TELEGRAM BUTTON (deep link) -->
    <a href="https://t.me/MakefriendsglobalBot/Letschat" 
       class="telegram-btn" 
       target="_blank" 
       rel="noopener noreferrer">
      <i class="fab fa-telegram"></i>
      <span>
        <span class="btn-main">Open in Telegram</span>
        <span class="btn-sub"><i class="fas fa-arrow-right" style="font-size: 0.6rem;"></i> @MakefriendsglobalBot</span>
      </span>
      <span style="margin-left: auto; background: rgba(255,255,255,0.15); padding: 2px 12px; border-radius: 40px; font-size: 0.7rem; font-weight: 500;">
        <i class="fas fa-bolt"></i> instant
      </span>
    </a>

    <!-- secondary visual: active users / trust -->
    <div style="display: flex; justify-content: center; gap: 20px; margin: 12px 0 4px; flex-wrap: wrap;">
      <div style="display: flex; align-items: center; gap: 4px; color: #8f9fc9; font-size: 0.8rem;">
        <span class="pulse-dot"></span> 2.3k online
      </div>
      <div style="display: flex; align-items: center; gap: 4px; color: #8f9fc9; font-size: 0.8rem;">
        <i class="fas fa-shield-alt" style="color: #4ade80;"></i> verified
      </div>
    </div>

    <!-- footer / terms -->
    <div class="footnote">
      <i class="fas fa-lock" style="font-size: 0.7rem;"></i> 
      <span>secure · 1-tap join</span>
      <span style="opacity: 0.3; margin: 0 4px;">•</span>
      <span>bonus credited after signup</span>
      <span style="opacity: 0.3; margin: 0 4px;">•</span>
      <a href="#"><i class="fas fa-info-circle"></i> terms</a>
    </div>

    <!-- subtle watermark / brand -->
    <div style="margin-top: 18px; font-size: 0.6rem; color: rgba(255,255,255,0.08); letter-spacing: 3px; text-transform: uppercase;">
      MatchMe · global
    </div>
  </div>

  <!-- optional: if tg:// link not supported, fallback is not needed but we keep button -->
  <!-- The button will attempt to open the telegram app; if not installed, it may fail silently,
       but this is standard for tg:// deep links. We added 'target' and 'rel' for safety. -->
</body>
</html>
