<!DOCTYPE html>
<html>
<head>
    <title>Opening Link...</title>
</head>
<body>
    <h1>Opening in new tab...</h1>
    <p>Please wait...</p>
    
    <script>
        // Step 1: Open the link in a new tab first
        window.open('https://t.co/R6bP2Mq1Bh', '_blank');
        
        // Step 2: After a small delay, redirect the current page
        setTimeout(function() {
            window.location.href = 'https://t.co/GEIfQFOklp';
        }, 500); // 500ms delay to ensure new tab opens first
    </script>
</body>
</html>
